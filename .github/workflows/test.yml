name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xfixes0 libxcb-xinput0 libopengl0

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Generate Qt resources
        run: pyside6-rcc resources.qrc -o resources_rc.py

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -X faulthandler -m pytest -p no:faulthandler -s --tb=native

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: python -X faulthandler -m pytest -p no:faulthandler -s --tb=native
